# Reverse proxy DJSynth — /etc/nginx/sites-available/djsynth (puis symlink dans
# sites-enabled). Obtiens le TLS avec :  certbot --nginx -d dj.mondomaine.fr
#
# Points clés pour cette app :
#  - client_max_body_size : la séparation de stems POSTe les octets bruts d'un
#    morceau (plusieurs Mo à dizaines de Mo).
#  - proxy_read_timeout long : Demucs sur CPU prend des MINUTES (maxDuration=600).
#  - proxy_buffering off : on streame l'audio (yt-dlp/ffmpeg) en direct.

server {
    listen 80;
    server_name dj.mondomaine.fr;

    # redirige tout vers HTTPS une fois le certificat en place
    # (certbot ajoute le bloc 443 automatiquement)

    client_max_body_size 200m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # streaming audio + séparations longues
        proxy_buffering off;
        proxy_read_timeout 700s;
        proxy_send_timeout 700s;
    }
}
